apiVersion: batch/v1
kind: Job
metadata:
  name: citadel-docsync-checker
  namespace: citadel-learning
  labels:
    app.kubernetes.io/name: citadel-docsync-checker
    app.kubernetes.io/part-of: citadel-agents
    operations.tomkw.dev/agent-level: "0"
    operations.tomkw.dev/container-profile: batch-agent-job
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: citadel-docsync-checker
        app.kubernetes.io/part-of: citadel-agents
        operations.tomkw.dev/agent-level: "0"
    spec:
      serviceAccountName: citadel-docsync-checker
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: checker
          # Placeholder only. Pin a real image tag or digest before enabling this
          # resource in kustomization.yaml.
          image: ghcr.io/tomkwilliams/citadel-docsync-checker:UNSET
          imagePullPolicy: IfNotPresent
          args:
            - --context
            - /read/context
            - --context-profile
            - /etc/docsync-profile/sources.txt
            - --out
            - /outbox/reports/docsync
            - --model
            - qwen3:8b
          env:
            - name: DOCSYNC_AGENT_NAME
              value: citadel-docsync-checker
            - name: DOCSYNC_MODEL
              value: qwen3:8b
            # Set only after the local model endpoint service is chosen.
            # - name: DOCSYNC_MODEL_ENDPOINT
            #   value: http://ollama.<namespace>.svc.cluster.local:11434
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: context
              mountPath: /read/context
              readOnly: true
            - name: outbox
              mountPath: /outbox
            - name: tmp
              mountPath: /tmp
            - name: context-profile
              mountPath: /etc/docsync-profile
              readOnly: true
      volumes:
        # Placeholder context bundle. Replace this with the reviewed bundle
        # delivery mechanism before enabling the Job.
        - name: context
          emptyDir: {}
        # Placeholder outbox. Replace with reviewed storage before enabling.
        - name: outbox
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: context-profile
          configMap:
            name: citadel-docsync-checker-context-profile
